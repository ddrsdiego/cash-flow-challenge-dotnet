# ============================================
# CashFlow System — Docker Compose
# ============================================
# Usage:
#   Infraestrutura apenas:  docker compose up -d
#   Tudo (com aplicação):   docker compose --profile app up -d
#
# Configuração:
#   Todas as variáveis ${...} são resolvidas do arquivo .env
#   na raiz do projeto (carregado automaticamente pelo Docker Compose).
#   Copie .env.example para .env e ajuste os valores antes de subir.
#
# Persistência:
#   Todos os serviços stateful usam named volumes (seção volumes).
#   Dados sobrevivem a docker compose down.
#   Para destruir dados: docker compose down -v
# ============================================

name: cashflow

services:

  # =============================================
  #  DATA STORES
  # =============================================

  mongodb:
    image: mongo:7.0
    container_name: cashflow-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7.2-alpine
    container_name: cashflow-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # =============================================
  #  MESSAGE BROKER
  # =============================================

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cashflow-rabbitmq
    restart: unless-stopped
    hostname: cashflow-rabbit
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_prometheus return_per_object_metrics true"
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"           # AMQP
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"  # Management UI
      - "15692:15692"                             # Prometheus metrics
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # =============================================
  #  IDENTITY PROVIDER
  # =============================================

  keycloak-db:
    image: postgres:16-alpine
    container_name: cashflow-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: cashflow-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB}"
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_PORT: 8080
    ports:
      - "${KEYCLOAK_PORT:-8443}:8080"
    volumes:
      - ./infra/config/keycloak:/opt/keycloak/data/import:ro
    networks:
      - frontend-net
      - backend-net
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M

  # =============================================
  #  OBSERVABILITY STACK
  # =============================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: cashflow-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yml"]
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"   # OTLP gRPC
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"   # OTLP HTTP
      - "8889:8889"                                 # Prometheus exporter
      - "13133:13133"                               # Health check
    volumes:
      - ./infra/config/otel/otel-collector-config.yml:/etc/otel/config.yml:ro
    networks:
      - backend-net
      - monitoring-net
    depends_on:
      jaeger:
        condition: service_healthy
      seq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: cashflow-jaeger
    restart: unless-stopped
    user: "root"   # Necessário para escrita no volume Badger (dev only)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"   # Jaeger UI
      - "4317"                              # OTLP gRPC (internal)
    volumes:
      - jaeger_data:/badger
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14269"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: cashflow-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring-net
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:10.4.2
    container_name: cashflow-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring-net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  seq:
    image: datalust/seq:2024.2
    container_name: cashflow-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "${SEQ_UI_PORT:-8341}:80"       # Seq UI
      - "${SEQ_PORT:-5341}:5341"        # Ingestion API (OTLP via OTel Collector)
    volumes:
      - seq_data:/data
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD-SHELL", "test -e /proc/1/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  # =============================================
  #  APPLICATION SERVICES (profile: app)
  #  Ativados com: docker compose --profile app up
  # =============================================

  cashflow-gateway:
    build:
      context: ./src/CashFlow.Gateway
      dockerfile: Dockerfile
    container_name: cashflow-gateway
    restart: unless-stopped
    profiles: ["app"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      # --- Auth ---
      Authentication__Authority: "http://keycloak:8080/realms/cashflow"
      Authentication__Audience: cashflow-api
      # --- Rate Limiting ---
      RateLimiting__PermitLimit: 100
      RateLimiting__WindowSeconds: 60
      # --- Observability ---
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: cashflow-gateway
      # --- Downstream Services ---
      ReverseProxy__Clusters__transactions__Destinations__default__Address: "http://cashflow-transactions-api:8080"
      ReverseProxy__Clusters__consolidation__Destinations__default__Address: "http://cashflow-consolidation-api:8080"
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    networks:
      - frontend-net
      - backend-net
    depends_on:
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  cashflow-transactions-api:
    build:
      context: .
      dockerfile: src/CashFlow.Transactions.API/Dockerfile
    container_name: cashflow-transactions-api
    restart: unless-stopped
    profiles: ["app"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      # --- Database ---
      MongoDB__ConnectionString: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/transactions_db?authSource=admin"
      MongoDB__DatabaseName: transactions_db
      # --- Messaging ---
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: ${RABBITMQ_DEFAULT_USER}
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
      # --- Auth ---
      Authentication__Authority: "http://keycloak:8080/realms/cashflow"
      Authentication__Audience: cashflow-api
      # --- Observability ---
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: cashflow-transactions-api
    ports:
      - "${TRANSACTIONS_API_PORT:-8081}:8080"
    networks:
      - backend-net
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  cashflow-consolidation-api:
    build:
      context: .
      dockerfile: src/CashFlow.Consolidation.API/Dockerfile
    container_name: cashflow-consolidation-api
    restart: unless-stopped
    profiles: ["app"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      # --- Database ---
      MongoDB__ConnectionString: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/consolidation_db?authSource=admin"
      MongoDB__DatabaseName: consolidation_db
      # --- Cache ---
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"
      Redis__InstanceName: "cashflow:consolidation:"
      Redis__DefaultExpirationMinutes: 5
      # --- Auth ---
      Authentication__Authority: "http://keycloak:8080/realms/cashflow"
      Authentication__Audience: cashflow-api
      # --- Observability ---
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: cashflow-consolidation-api
    ports:
      - "${CONSOLIDATION_API_PORT:-8082}:8080"
    networks:
      - backend-net
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  cashflow-consolidation-worker:
    build:
      context: .
      dockerfile: src/CashFlow.Consolidation.Worker/Dockerfile
    container_name: cashflow-consolidation-worker
    restart: unless-stopped
    profiles: ["app"]
    environment:
      DOTNET_ENVIRONMENT: Development
      # --- Database ---
      MongoDB__ConnectionString: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/consolidation_db?authSource=admin"
      MongoDB__DatabaseName: consolidation_db
      # --- Cache (invalidation) ---
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"
      Redis__InstanceName: "cashflow:consolidation:"
      # --- Messaging ---
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: ${RABBITMQ_DEFAULT_USER}
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
      # --- Observability ---
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: cashflow-consolidation-worker
    networks:
      - backend-net
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Worker não tem HTTP — health check via processo
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f dotnet || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

# =============================================
#  NETWORKS
# =============================================

networks:
  frontend-net:
    name: cashflow-frontend
    driver: bridge

  backend-net:
    name: cashflow-backend
    driver: bridge

  monitoring-net:
    name: cashflow-monitoring
    driver: bridge

# =============================================
#  VOLUMES
# =============================================

volumes:
  mongodb_data:
    name: cashflow-mongodb-data
  mongodb_config:
    name: cashflow-mongodb-config
  redis_data:
    name: cashflow-redis-data
  rabbitmq_data:
    name: cashflow-rabbitmq-data
  keycloak_db_data:
    name: cashflow-keycloak-db-data
  jaeger_data:
    name: cashflow-jaeger-data
  prometheus_data:
    name: cashflow-prometheus-data
  grafana_data:
    name: cashflow-grafana-data
  seq_data:
    name: cashflow-seq-data