# ============================================
# Prometheus Configuration
# Scrapes metrics from OTel Collector and infrastructure
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # --- OpenTelemetry Collector metrics ---
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          source: 'otel'

  # --- .NET application metrics (via OTel Collector) ---
  # Metrics flow: .NET → OTel Collector → Prometheus
  # No direct scrape needed — OTel Collector exposes them

  # --- RabbitMQ metrics ---
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
        labels:
          service: 'rabbitmq'
    metrics_path: /metrics

  # --- Redis metrics (via redis-exporter if added) ---
  # Placeholder for future redis_exporter container

  # --- Prometheus self-monitoring ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']